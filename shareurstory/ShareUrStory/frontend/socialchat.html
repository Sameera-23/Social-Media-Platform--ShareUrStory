<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - ShareUrStory</title>

    <link rel="stylesheet" href="socialchat.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar">

    <div class="logo">

        <i class="fas fa-book-open"></i>

        <span>ShareUrStory</span>

    </div>
    

    <div class="nav-icons">

        <a href="socialhome.html">
            <i class="fas fa-house"></i>
        </a>

        <a href="socialstory.html">
            <i class="fas fa-pen"></i>
        </a>

        <a href="socialnotification.html">
            <i class="fas fa-bell"></i>
        </a>

        <a href="socialprofile.html">
            <i class="fas fa-user"></i>
        </a>

    </div>
    <a href="#" id="logoutBtn">
    <i class="fas fa-right-from-bracket"></i>
</a>

</nav>

<!-- CHAT CONTAINER -->

<div class="chat-layout">

    <!-- LEFT PANEL -->

    <aside class="chat-sidebar">

        <div class="chat-search">

            <input
            type="text"
            id="chatSearch"
            placeholder="Search conversations">

        </div>

        <div class="conversation-list">

            <div class="conversation active">

                <img
                src="https://i.pravatar.cc/100?img=20">

                <div>

                    <h4>Priya Sharma</h4>

                    <span>Data Scientist</span>

                </div>

            </div>

            <div class="conversation">

                <img
                src="https://i.pravatar.cc/100?img=21">

                <div>

                    <h4>Arjun Kumar</h4>

                    <span>Java Developer</span>

                </div>

            </div>

            <div class="conversation">

                <img
                src="https://i.pravatar.cc/100?img=22">

                <div>

                    <h4>Rahul Verma</h4>

                    <span>Frontend Developer</span>

                </div>

            </div>

        </div>

    </aside>

    <!-- CHAT WINDOW -->

    <main class="chat-window">

        <!-- Header -->

        <div class="chat-header">

            <div class="chat-user">

                <img
                src="https://i.pravatar.cc/100?img=20">

                <div>

                    <h3 id="chatName">
                        Priya Sharma
                    </h3>

                    <span class="online">

                        ● Online

                    </span>

                </div>

            </div>

            <div class="chat-actions">

                <button>
                    <i class="fas fa-phone"></i>
                </button>

                <button>
                    <i class="fas fa-video"></i>
                </button>

                <button>
                    <i class="fas fa-circle-info"></i>
                </button>

            </div>

        </div>

        <!-- Messages -->

        <div
        class="messages-area"
        id="messagesArea">

            <div class="message received">

                <p>
                    Hi Sameera 👋
                </p>

                <small>
                    09:30 AM
                </small>

            </div>

            <div class="message received">

                <p>
                    How can I help with your career journey?
                </p>

                <small>
                    09:31 AM
                </small>

            </div>

            <div class="message sent">

                <p>
                    I want guidance on Java Backend Development.
                </p>

                <small>
                    09:32 AM
                </small>

            </div>

        </div>

        <!-- Input -->

        <div class="message-input">

            <button class="attach-btn">

                <i class="fas fa-paperclip"></i>

            </button>

            <input
            type="text"
            id="messageInput"
            placeholder="Type your message...">

            <button
            id="sendBtn"
            class="send-btn">

                <i class="fas fa-paper-plane"></i>

            </button>

        </div>

    </main>

</div>

<script src="socialchat.js"></script>

</body>
</html>
