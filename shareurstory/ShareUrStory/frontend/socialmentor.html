<!DOCTYPE html>
<html>
<head>
    <title>Mentors - ShareUrStory</title>

    <link rel="stylesheet" href="socialmentor.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        <i class="fas fa-book-open"></i>
        ShareUrStory
    </div>

    <div class="search-box">

        <input
        type="text"
        id="mentorSearch"
        placeholder="Search mentors">

    </div>
     <a href="#" id="logoutBtn">
    <i class="fas fa-right-from-bracket"></i>
</a>

</nav>

<div class="mentor-container">

    <h1>Find Mentors</h1>

    <div class="mentor-grid">

        <div class="mentor-card">
            <div class="mentor-badge">
    ⭐ Verified Mentor
</div>

<div class="mentor-stats">

    <div>
        <h4>120</h4>
        <span>Students</span>
    </div>

    <div>
        <h4>4.9</h4>
        <span>Rating</span>
    </div>

    <div>
        <h4>8Y</h4>
        <span>Experience</span>
    </div>

</div>

            <img
            src="https://i.pravatar.cc/200?img=20">

            <h3>
                Priya Sharma
            </h3>

            <p>
                Data Scientist
            </p>

            <div class="mentor-skills">

                <span>Python</span>

                <span>ML</span>

                <span>AI</span>

            </div>

            <button class="follow-btn">

                Follow

            </button>

            <button class="chat-btn">

                Message

            </button>

        </div>

    </div>

</div>

<script src="socialmentor.js"></script>

</body>
</html>
