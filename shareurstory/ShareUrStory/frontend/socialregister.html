<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ShareUrStory</title>

    <link rel="stylesheet" href="socialstyle.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">

    <div class="hero-section">

        <div class="brand">
            <i class="fas fa-book-open"></i>
            <h1>ShareUrStory</h1>
        </div>

        <h2>Create Your Career Story</h2>

        <p>
            Join thousands of students and professionals
            sharing their career journeys.
        </p>

    </div>

    <div class="login-section">

        <div class="login-card">

            <h2>Create Account</h2>

            <form id="registerForm">

                <div class="input-group">
                    <i class="fas fa-user"></i>

                    <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>

                    <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>

                    <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>
                </div>

                <button
                type="submit"
                class="login-btn">

                    Create Account

                </button>

            </form>

            <p class="register-text">

                Already have an account?

                <a href="socialindex.html">
                    Login
                </a>

            </p>

        </div>

    </div>

</div>

<script src="socialregister.js"></script>

</body>
</html>
